<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple CMS</title>

  <link rel="stylesheet" href="style.css">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Segoe UI', sans-serif;
    }

    body{
      min-height:100vh;
    }

    .header{
      width:100%;
      padding:18px 8%;
      display:flex;
      justify-content:space-between;
      align-items:center;
      flex-wrap:wrap;
    }

    .logo h1{
      font-size:28px;
    }

    .navbar ul{
      display:flex;
      gap:20px;
      list-style:none;
      flex-wrap:wrap;
    }

    .navbar a{
      text-decoration:none;
      transition:0.3s;
    }

    .container{
      width:90%;
      max-width:850px;
      margin:40px auto;
      padding:35px;
      border-radius:20px;
      box-shadow:0 5px 15px rgba(0,0,0,0.08);
      animation:fadeIn 0.7s ease;
    }

    .container h1{
      text-align:center;
      margin-bottom:30px;
    }
    form{
      display:flex;
      flex-direction:column;
      gap:15px;
    }

    label{
      font-weight:600;
    }

    input,
    textarea{
      padding:14px;
      border-radius:10px;
      border:1px solid #ccc;
      outline:none;
      font-size:15px;
    }

    textarea{
      min-height:150px;
      resize:vertical;
    }

    button{
      padding:14px;
      border:none;
      border-radius:10px;
      cursor:pointer;
      font-size:16px;
      font-weight:bold;
      transition:0.3s;
    }

    button:hover{
      transform:translateY(-2px);
    }

    .artikel-section{
      margin-top:40px;
    }

    .artikel-section h2{
      margin-bottom:20px;
    }

    #listArtikel{
      display:flex;
      flex-direction:column;
      gap:20px;
    }

    .artikel-card{
      padding:20px;
      border-radius:15px;
      transition:0.3s;
    }

    .artikel-card:hover{
      transform:translateY(-3px);
      box-shadow:0 5px 15px rgba(0,0,0,0.08);
    }

    .artikel-card h3{
      margin-bottom:10px;
    }

    .artikel-card p{
      line-height:1.6;
    }
    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }
    @media(max-width:768px){

      .header{
        flex-direction:column;
        gap:15px;
      }

      .navbar ul{
        justify-content:center;
      }

      .container{
        padding:25px;
      }

    }
  </style>
</head>

<body>
  <header class="header">
    
    <div class="logo">
      <h1>Gita<span>Portfolio</span></h1>
    </div>

    <nav class="navbar">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="index.html">Tentang</a></li>
        <li><a href="index.html">Hobi</a></li>
        <li><a href="index.html">Goals</a></li>
        <li><a href="index.html">Favourite</a></li>
        <li><a href="index.html">Kontak</a></li>
        <li><a href="index.html">Artikel</a></li>
      </ul>
    </nav>

  </header>

  <div class="container">
    <h1>Content Management System</h1>
    <form id="formArtikel">
      <input type="hidden" id="editIndex">

      <label for="judul">Judul:</label>
      <input 
        type="text" 
        id="judul"
        placeholder="Masukkan judul artikel"
      >

      <label for="isi">Isi Artikel:</label>
      <textarea 
        id="isi"
        placeholder="Tulis isi artikel..."
      ></textarea>

      <!-- Upload Gambar -->
      <label for="gambar">UPLOAD GAMBAR (OPSIONAL)</label>
      <input type="file" id="gambar" accept="image/*">

      <!-- Lampiran File -->
      <label for="lampiran">LAMPIRAN FILE (OPSIONAL)</label>
      <input type="file" id="lampiran">

      <button type="submit">Simpan</button>

    </form>


    <div class="artikel-section">
      <h2>Daftar Artikel</h2>
      <div id="listArtikel">
        <div class="artikel-card">
          <h3>Contoh Artikel</h3>
          <p>Artikel yang disimpan akan tampil di sini.</p>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>

</body>
</html>
